<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Group Assignment Tracker</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="authCard" class="checklist-card auth-card">
        <header class="checklist-header">
          <div>
            <p class="eyebrow">Assignment Tracker</p>
            <h1 id="authTitle">Sign in</h1>
          </div>
        </header>

        <div class="auth-body">
          <p id="authHint" class="auth-hint">
            Use the same email and password on any device to load your synced tasks.
          </p>
          <form id="authForm" class="auth-form">
            <input id="authEmail" class="auth-input" type="email" placeholder="Email" autocomplete="email" />
            <input
              id="authPassword"
              class="auth-input"
              type="password"
              placeholder="Password"
              autocomplete="current-password"
            />
            <button id="authSubmitBtn" class="primary-button" type="submit">Sign in</button>
          </form>
          <button id="authToggleBtn" class="text-button auth-toggle" type="button">
            Need an account? Create one
          </button>
          <p id="authStatus" class="status-text"></p>
        </div>
      </section>

      <section id="appCard" class="checklist-card app-card" hidden>
        <header class="checklist-header">
          <div>
            <p class="eyebrow">Assignment Tracker</p>
            <h1 id="pageTitle">Projects</h1>
          </div>
          <div class="header-actions">
            <span id="userEmail" class="user-chip"></span>
            <span id="syncStatus" class="sync-chip">Signed out</span>
            <button id="resetDataBtn" class="text-button" type="button">Reset</button>
            <button id="exportBtn" class="text-button" type="button">Export</button>
            <button id="signOutBtn" class="text-button" type="button">Sign out</button>
          </div>
        </header>

        <section class="project-panel">
          <div class="project-controls">
            <label class="project-picker">
              <span>Project</span>
              <select id="projectSelect" class="project-select"></select>
            </label>
            <form id="projectForm" class="project-form">
              <input id="projectNameInput" class="project-input" type="text" placeholder="New project name" />
              <button class="mini-button" type="submit">Add project</button>
            </form>
          </div>
          <div class="project-actions-row">
            <form id="milestoneForm" class="inline-form">
              <input id="milestoneTitleInput" class="project-input" type="text" placeholder="New milestone" />
              <input id="milestoneDueInput" class="project-input" type="date" />
              <button class="mini-button" type="submit">Add milestone</button>
            </form>
            <form id="meetingForm" class="inline-form">
              <input id="meetingTitleInput" class="project-input" type="text" placeholder="Meeting title" />
              <input id="meetingDateInput" class="project-input" type="datetime-local" />
              <button class="mini-button" type="submit">Add meeting</button>
            </form>
          </div>
          <div class="project-actions-row">
            <form id="inviteForm" class="inline-form">
              <input id="inviteEmailInput" class="project-input" type="email" placeholder="Collaborator email" />
              <select id="inviteRoleInput" class="project-select">
                <option value="editor">Editor</option>
                <option value="viewer">Viewer</option>
                <option value="member">Member</option>
              </select>
              <button class="mini-button" type="submit">Invite / Add</button>
            </form>
          </div>
        </section>

        <section class="progress-panel">
          <div class="progress-copy">
            <strong id="progressPercent">0%</strong>
            <span id="taskCount">0/0 tasks complete</span>
          </div>
          <div class="progress-bar">
            <div id="progressFill" class="progress-fill"></div>
          </div>
        </section>

        <section class="dashboard-grid">
          <div class="dashboard-card">
            <div class="dashboard-title">Members</div>
            <div id="memberList" class="tag-list"></div>
          </div>
          <div class="dashboard-card">
            <div class="dashboard-title">Milestones</div>
            <div id="milestoneList" class="list-stack"></div>
          </div>
          <div class="dashboard-card">
            <div class="dashboard-title">Due Soon</div>
            <div id="dueSoonList" class="list-stack"></div>
          </div>
          <div class="dashboard-card">
            <div class="dashboard-title">Meetings</div>
            <div id="meetingList" class="list-stack"></div>
          </div>
          <div class="dashboard-card">
            <div class="dashboard-title">Invitations</div>
            <div id="invitationList" class="list-stack"></div>
          </div>
        </section>

        <section id="taskList" class="task-list"></section>

        <form id="newTaskForm" class="new-task-row">
          <button class="plus-button" type="submit" aria-label="Add task">+</button>
          <input
            id="newTaskTitle"
            class="new-task-input"
            type="text"
            placeholder="New checklist item"
            autocomplete="off"
          />
        </form>

        <section class="archive-panel">
          <div class="dashboard-title">Archived tasks</div>
          <div id="archivedTaskList" class="list-stack"></div>
        </section>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
